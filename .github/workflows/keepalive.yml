name: Keep HF Space Alive

on:
  schedule:
    # Runs every 24 hours at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: none

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      HF_REPO_ID: ${{ vars.HF_REPO_ID }}
    steps:
      - name: Derive Space URL and ping
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${HF_REPO_ID}" ]]; then
            echo "HF_REPO_ID variable not set — skipping ping."
            exit 0
          fi

          # HF_REPO_ID format: owner/repo-name  (e.g. jackywangsh/toeicPass)
          # Space URL: https://owner-repo-name.hf.space  (HF lowercases everything)
          SPACE_URL="https://$(echo "${HF_REPO_ID}" | tr '/' '-' | tr '[:upper:]' '[:lower:]').hf.space"

          echo "Pinging ${SPACE_URL} ..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 10 \
            "${SPACE_URL}")

          echo "Response code: ${HTTP_CODE}"

          if [[ "${HTTP_CODE}" == "000" ]]; then
            echo "No response (Space may be waking up). Heartbeat sent."
          else
            echo "Heartbeat successful."
          fi
